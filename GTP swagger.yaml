    get:
      tags:
        - Activity
      summary: Activity
      produces:
        - application/json
      parameters:
        - in: query
          name: include
          description: >-
            A comma delimited list of JSON properties to return. All remaining
            JSON properties will removed from the JSON response. Example: id,
            description, cutListItems. Specific dictionary keys can be included
            as follows: properties["Family"], propertiesGtp["Material"]
          type: string
          x-ms-dynamic-values:
            operationId: Activity
            value-path: data
            value-collection: filterOptions
        - in: query
          name: where
          description: >-
            Filter on JSON property values. Example: To filter on two JSON
            properties: length eq '10' AND description == "truck". To get the
            last 30 days of data, use: createdDT ge DateTime.Now.AddDays(-30)
          type: string
        - in: query
          name: page
          description: >-
            Offset retrieves a given page of data, where 0 is the 1st page, etc
            (number of elements per page is set by PageSize below)
          type: integer
        - in: query
          name: pagesize
          description: >-
            Optional: defines the number of elements per page (default (and max)
            is 1000)
          type: integer
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/ActivityDataApiPagedData'
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
        '500':
          description: Server Error
      operationId: Activity
      description: >-
        Get a paged list of activity logs.Sorted by CreatedDT desc.See
        ActivityDataApi documentation for limits on where clause.
      $$hashKey: object:3634
