  Attachment:
    description: "Attachment is a file reference stored in the file share\r\nProjectId is required, but ModelId is optional\r\nItemId refer to a specific file item version URN in A360 storage"
    required:
      - fileName
      - id
      - itemId
      - itemLink
      - modelId
      - projectId
      - referenceId
      - referenceType
    type: object
    properties:
      projectId:
        type: string
      modelId:
        type: string
      referenceType:
        $ref: '#/definitions/ReferenceType'
      referenceId:
        type: string
      role:
        $ref: '#/definitions/AttachmentRole'
      fileType:
        $ref: '#/definitions/AttachmentFileType'
      localFilePath:
        type: string
      fileName:
        type: string
      overriddenRemoteFolder:
        description: >-
          The remote folder has traditionally been determined by STRATUS based
          on the extension of the file. This allows the code publishing the
          Attachment to specify the remote folder path instead of basing it on
          the extension.
        type: string
      itemId:
        description: A360 File Item Version URN
        type: string
      itemIdBase64URN:
        description: >-
          Returns a Base64URN based on the ItemId property, which must be
          retrieved from Mongo to use this getter.
        type: string
        readOnly: true
      fileByteCount:
        format: int64
        type: integer
      fileUploadTimeInSeconds:
        format: double
        type: number
      itemLink:
        description: A360 Meta Link Href
        type: string
      isCollaboration:
        type: boolean
      isMarkups:
        type: boolean
      previewImageFileId:
        type: string
      totalTransformationMatrix:
        description: "4X4 matrix that defines the transformation to apply to a CAD \r\ndocument when inserting it into its parent CAD document.\r\nBasisX.X  BasisY.X  BasisZ.X  Trans.X\r\nBasisX.Y  BasisY.Y  BasisZ.Y  Trans.Y\r\nBasisX.Z  BasisY.Z  BasisZ.Z  Trans.Z\r\n0         0         0         1"
        type: array
        items:
          type: object
          additionalProperties: false
      parentAttachmentId:
        description: "ID of the parent attachment (if it has one).  \r\nUsed to define the hierarchy for CAD external references.\r\nNote that a CAD external reference directly linked to the model will NOT have a parent!  \r\nOnly external references linked more that one level deep will have a parent."
        type: string
      fabFileGroupId:
        format: int32
        description: 'OPTIONAL: Used by Field Orderz'
        type: integer
      id:
        type: string
      createdDT:
        format: date-time
        type: string
      createdById:
        type: string
      modifiedDT:
        format: date-time
        type: string
      modifiedById:
        type: string
      isPartialData:
        type: boolean
        readOnly: true
      includedPropertiesIfPartialData:
        type: array
        items:
          type: string
        readOnly: true
    additionalProperties: false
