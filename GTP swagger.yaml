  /v1/part/{id}/tracking-status:
    post:
      tags:
        - Part
      summary: Post.Part.ID.TrackingStatus
      consumes:
        - application/json-patch+json
        - application/json
        - text/json
        - application/*+json
        - application/xml
        - text/xml
        - application/*+xml
      produces:
        - application/json
      parameters:
        - in: path
          name: id
          description: STRATUS Part Id
          required: true
          type: string
          x-ms-dynamic-values:
            operationId: Part
            value-path: id
            value-collection: data
            value-title: description
        - in: query
          name: isCut
          description: 'DEFAULT: true. If set to false, will not mark the part as cut.'
          type: boolean
          default: true
        - in: body
          name: body
          description: 'REQUIRED: TrackingStatusId'
          schema:
            $ref: '#/definitions/TrackingStatusPOST'
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/TrackingStatusPOST'
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
        '500':
          description: Server Error
      description: >-
        Post part tracking status, and, optionally (by default), if the part is
        in a cutlist that has been sent to a station, mark the part as cut (i.e.
        set the part's CutDateTime in the cutlist to now, and set the part's
        field, CutDT, to the current time--which will also cause
        STRATUS.Part.IsCut to report a 1). This optional behavior of marking a
        part as cut is is the default behavior. To disable it, pass in
        isCut=false on the URL.
      operationId: Post.Part.ID.TrackingStatus
