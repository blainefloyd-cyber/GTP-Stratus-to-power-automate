definitions:
  ActivityActionType:
    format: int32
    description: "needs to be readable when combined with ActivityReferenceType for ActivitySettings\r\nread as Action then Reference (e.g. Created Assembly, or Published Model)\r\nusing .ToName(BreakWordsByUpperCase)"
    enum:
      - 0 = Unspecified
      - 1 = Created
      - 2 = Modified
      - 3 = Deleted
      - 4 = Activated
      - 5 = Archived
      - 6 = PublishFailed
      - 7 = Published
      - 8 = TrackingStatusChanged
      - 9 = Shipped
      - 10 = Received
      - 11 = Completed
      - 12 = AssignedToStation
      - 13 = DateChanged
      - 14 = Locked
      - 15 = Unlocked
      - 16 = Reverted
      - 17 = QuoteProcessed
      - 18 = PurchaseOrderProcessed
      - 19 = Invoiced
      - 20 = DeletedItemNumbers
  ActivityDataApi:
    required:
      - id
    type: object
    properties:
      id:
        description: Id of the activity record
        type: string
      createdDT:
        format: date-time
        description: Timestamp of the activity (when it occured)
        type: string
      createdById:
        description: Id of whovever did the activity
        type: string
      createdByName:
        description: READ ONLY - the 'where' query does NOT apply.
        type: string
      divisionId:
        description: Division(fka Processor) id - specific to tracking status changes
        type: string
      divisionName:
        description: READ ONLY - the 'where' query does NOT apply.
        type: string
      route:
        description: Action from which the activity originated
        type: string
      projectId:
        description: Populated for activities that are project specific
        type: string
      projectName:
        description: READ ONLY - the 'where' query does NOT apply.
        type: string
      projectNumber:
        description: READ ONLY - the 'where' query does NOT apply.
        type: string
      projectColor:
        description: READ ONLY - the 'where' query does NOT apply.
        type: string
      modelId:
        description: Populated for activities that are model specific
        type: string
      modelName:
        description: READ ONLY - the 'where' query does NOT apply.
        type: string
      reference:
        $ref: '#/definitions/ActivityReferenceType'
      referenceId:
        description: The id of object to which the activity occurred
        type: string
      referenceName:
        description: "READ ONLY - the 'where' query does NOT apply.\r\nKind of id that ReferenceId corresonds to \r\nE.g., if RefrenceName is Model, then ReferenceId is a ModelId"
        type: string
        readOnly: true
      action:
        $ref: '#/definitions/ActivityActionType'
      actionName:
        description: READ ONLY - the 'where' query does NOT apply.
        type: string
        readOnly: true
      name:
        description: >-
          That name of item or property changed (e.g. item's name or property
          name)
        type: string
      value:
        description: Optional
        type: string
      processorId:
        description: Processor id - specific to tracking status changes
        type: string
      processorName:
        description: READ ONLY - the 'where' query does NOT apply.
        type: string
      trackingStatusId:
        description: Tracking status id - specific to tracking status changes
        type: string
      trackingStatusName:
        description: READ ONLY - the 'where' query does NOT apply.
        type: string
      trackingStatusColor:
        description: Tracking status color from TrackingStatusId
        type: string
      stationId:
        description: Station id - specific to assigned to station
        type: string
      stationName:
        description: READ ONLY - the 'where' query does NOT apply.
        type: string
    additionalProperties: false
  ActivityDataApiPagedData:
    type: object
    properties:
      data:
        type: array
        items:
          $ref: '#/definitions/ActivityDataApi'
      pageOffset:
        format: int32
        type: integer
      pageLimit:
        format: int32
        type: integer
      pageCount:
        format: int32
        type: integer
        readOnly: true
      total:
        format: int64
        type: integer
      filterOptions:
        type: array
        items:
          $ref: '#/definitions/FilterOption'
      links:
        type: object
        additionalProperties:
          type: object
    additionalProperties: false
  ActivityReferenceType:
    format: int32
    description: "needs to be readable when combined with ActivityActionType for ActivitySettings\r\nread as Action then Reference (e.g. Created Assembly, or Published Model)\r\nusing .ToName(BreakWordsByUpperCase)"
    enum:
      - 0 = Unspecified
      - 1 = User
      - 2 = Company
      - 3 = Project
      - 4 = Model
      - 5 = Package
      - 6 = Assembly
      - 7 = Part
      - 8 = Attachment
      - 9 = Container
      - 10 = Supplier
      - 11 = BillOfMaterialsOrder
      - 12 = Shipment
      - 13 = CutList
      - 14 = Package BOM
    title: ''
    type: string
  AnnotationDataApi:
    type: object
    properties:
      projectId:
        type: string
      modelId:
        type: string
      stratusDimensionType:
        $ref: '#/definitions/StratusDimensionType'
      orderId:
        type: string
      assemblyId:
        type: string
      partCadIds:
        type: array
        items:
          type: string
      colorIndex:
        format: int32
        type: integer
      dimensionLineType:
        $ref: '#/definitions/DimensionLineType'
      connectedAssemblyId:
        type: string
      distance:
        format: double
        type: number
      label:
        type: string
      lineVertices:
        type: array
        items:
          $ref: '#/definitions/Point3D'
        readOnly: true
      location:
        $ref: '#/definitions/Point3D'
      gridlineAnnotation:
        type: string
      dimensionAnchorTypes:
        type: array
        items:
          $ref: '#/definitions/DimensionAnchorPoint'
    additionalProperties: false
  AssemblyDataApi:
    type: object
